{% extends 'base.html' %}
{% block title %}Start Shift - SmartPOS{% endblock %}
{% block page_title %}Open Register / Start Shift{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card border-0 shadow-lg mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="display-4 text-primary mb-3"><i class="fas fa-cash-register"></i></div>
                    <h3 class="fw-bold">Ready to start?</h3>
                    <p class="text-muted">Enter the opening cash balance in the drawer.</p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold">Opening Balance (Cash)</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-money-bill-wave"></i></span>
                            <input type="number" name="opening_balance" class="form-control bg-light border-0" placeholder="0.00" step="0.01" required autofocus>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm fw-bold py-3">
                        OPEN REGISTER <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
