{% extends 'base.html' %}
{% block title %}Collect Payment - {{ customer.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card p-4 shadow-lg border-0 rounded-4 text-center">
            <div class="bg-primary-subtle p-3 rounded-4 mb-4">
                <i class="fas fa-hand-holding-usd fa-3x text-primary mb-3"></i>
                <h3 class="fw-bold mb-1">{{ customer.name }}</h3>
                <h4 class="text-danger fw-bold">Total Due: ${{ customer.balance }}</h4>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold">Collection Amount ($)</label>
                    <div class="input-group">
                        <span class="input-group-text rounded-start-pill border-0 shadow-sm bg-success text-white px-3">$</span>
                        <input type="number" name="amount" class="form-control rounded-end-pill border-0 shadow-sm px-4" step="0.01" max="{{ customer.balance }}" placeholder="Enter amount to pay" required>
                    </div>
                    <small class="text-muted mt-2 d-block">Maximum collection: ${{ customer.balance }}</small>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success rounded-pill py-3 fw-bold shadow-lg">
                        <i class="fas fa-check-circle me-2"></i> Confirm Collection
                    </button>
                    <a href="{% url 'customer_list' %}" class="btn btn-light rounded-pill py-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
