{% extends 'base.html' %}
{% block title %}System Settings - SmartPOS{% endblock %}
{% block page_title %}General Settings{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="fw-bold mb-0">Customize Your POS System</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Shop Name</label>
                            <input type="text" name="shop_name" class="form-control" value="{{ settings.shop_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Tax Percentage (%)</label>
                            <input type="number" name="tax_percentage" class="form-control" value="{{ settings.tax_percentage }}" step="0.01" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Currency Symbol</label>
                            <input type="text" name="currency_symbol" class="form-control" value="{{ settings.currency_symbol }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Low Stock Threshold</label>
                            <input type="number" name="low_stock_threshold" class="form-control" value="{{ settings.low_stock_threshold }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Shop Logo</label>
                            {% if settings.shop_logo %}
                            <div class="mb-2">
                                <img src="{{ settings.shop_logo.url }}" alt="Logo" class="rounded shadow-sm" style="max-height: 80px;">
                            </div>
                            {% endif %}
                            <input type="file" name="shop_logo" class="form-control">
                            <small class="text-muted">Recommended size: 200x200px (PNG/JPG)</small>
                        </div>
                    </div>
                    
                    <div class="mt-5 border-top pt-4">
                        <button type="submit" class="btn btn-primary px-5 btn-pill fw-bold">
                            <i class="fas fa-save me-2"></i> SAVE CHANGES
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
