{% extends 'base.html' %}
{% block title %}SmartPOS - Add Customer{% endblock %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-5">
        <div class="card p-4 shadow-lg border-0 rounded-4">
            <h3 class="fw-bold mb-4 d-flex align-items-center">
                <a href="{% url 'customer_list' %}" class="btn btn-sm btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
                Register Customer
            </h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-bold">Full Name</label>
                    <input type="text" name="name" class="form-control rounded-pill border-0 shadow-sm px-4" placeholder="e.g. John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Phone Number</label>
                    <input type="text" name="phone" class="form-control rounded-pill border-0 shadow-sm px-4" placeholder="e.g. +880 1234 5678" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email (Optional)</label>
                    <input type="email" name="email" class="form-control rounded-pill border-0 shadow-sm px-4" placeholder="e.g. john@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Address (Optional)</label>
                    <textarea name="address" class="form-control rounded-4 border-0 shadow-sm px-4 pt-3" rows="2" placeholder="Customer address..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow-lg mt-3">
                    <i class="fas fa-save me-2"></i> Register Now
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
