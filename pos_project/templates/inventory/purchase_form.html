{% extends 'base.html' %}
{% block title %}SmartPOS - Record Purchase{% endblock %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow-lg border-0 rounded-4">
            <h3 class="fw-bold mb-4 d-flex align-items-center">
                <a href="{% url 'purchase_list' %}" class="btn btn-sm btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
                New Stock Entry (Purchase)
            </h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-bold">Product to Restock</label>
                    <select name="product" class="form-select rounded-pill border-0 shadow-sm px-4" required>
                        <option value="">Select Product</option>
                        {% for product in products %}
                        <option value="{{ product.id }}" {% if request.GET.product == product.id|stringformat:'s' %}selected{% endif %}>{{ product.name }} (Current: {{ product.stock }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Supplier</label>
                    <select name="supplier" class="form-select rounded-pill border-0 shadow-sm px-4" required>
                        <option value="">Select Supplier</option>
                        {% for supplier in suppliers %}
                        <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="row g-3">
                    <div class="col-6 mb-3">
                        <label class="form-label small fw-bold">Quantity</label>
                        <input type="number" name="quantity" class="form-control rounded-pill border-0 shadow-sm px-4" min="1" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label small fw-bold">Purchase Price/Unit ($)</label>
                        <div class="input-group">
                            <span class="input-group-text rounded-start-pill border-0 shadow-sm bg-primary text-white">$</span>
                            <input type="number" name="purchase_price" class="form-control rounded-end-pill border-0 shadow-sm px-4" step="0.01" required>
                        </div>
                    </div>
                </div>
                <p class="text-muted small"><strong>Note:</strong> Adding a purchase will automatically increase the product's stock levels and log the movement.</p>
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow-lg mt-3">
                   <i class="fas fa-file-invoice me-2"></i> Confirm Purchase & Update Stock
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
