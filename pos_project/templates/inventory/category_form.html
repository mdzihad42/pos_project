{% extends 'base.html' %}
{% block title %}SmartPOS - Add Category{% endblock %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-5">
        <div class="card p-4 shadow-lg border-0 rounded-4 text-center">
            <h3 class="fw-bold mb-4 d-flex align-items-center">
                <a href="{% url 'category_list' %}" class="btn btn-sm btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
                Create New Category
            </h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold">Name</label>
                    <input type="text" name="name" class="form-control rounded-pill border-0 shadow-sm px-4" placeholder="Electronics, Clothing, Furniture, etc." required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold">Description (Optional)</label>
                    <textarea name="description" class="form-control rounded-4 border-0 shadow-sm px-4 pt-3" rows="3" placeholder="Brief description of category items..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow-lg mt-3">
                   <i class="fas fa-plus-circle me-2"></i> Save New Category
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
